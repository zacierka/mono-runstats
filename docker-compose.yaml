services:
  bot:
    build:
      context: .
      dockerfile: infra/images/Dockerfile.discord
    container_name: strava-bot
    ports:
      - "4000:4000"
    env_file:
      - apps/bot/.env.bot
    depends_on:
      - postgres
    restart: unless-stopped

  webstrava:
    build:
      context: .
      dockerfile: infra/images/Dockerfile.web
    container_name: webstrava
    ports:
      - "3000:3000"
    env_file:
      - apps/webstrava/.env.webstrava
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: strava-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: strava
      POSTGRES_PASSWORD: strava
      POSTGRES_DB: strava_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: